name: CI

# The site now runs on Cloudflare Workers via OpenNext (not a static export).
# Day-to-day deploys are done manually with `npm run deploy`. This workflow
# only verifies that the app builds on every push, and — if (and only if)
# Cloudflare credentials are present as repo secrets — publishes to Workers.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Always-green build check. Verifies types + production build compile.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js)
        run: npm run build

  # ---------------------------------------------------------------------------
  # Optional deploy to Cloudflare Workers via OpenNext. Skipped entirely unless
  # both secrets are set, so the workflow never fails just because deployment
  # isn't configured. Manual deploys via `npm run deploy` remain the default.
  # ---------------------------------------------------------------------------
  deploy-workers:
    needs: build
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: npm ci

      - name: Build & deploy to Cloudflare Workers (OpenNext)
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: npm run deploy
